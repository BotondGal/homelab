name: Build & Push grafana-clickhouse

on:
  push:
    paths:
      - "clusters/homelab/namespaces/observability/grafana/Dockerfile"
      - ".github/workflows/build-grafana-clickhouse.yaml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/botondgal/grafana-clickhouse

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Dockerfile
        id: version
        run: |
          TAG=$(grep -m1 '^ARG GRAFANA_VERSION=' clusters/homelab/namespaces/observability/grafana/Dockerfile | cut -d= -f2)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: clusters/homelab/namespaces/observability/grafana
          push: false
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PUSH_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: clusters/homelab/namespaces/observability/grafana
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
