# === Cluster-Identifikation ===
cluster:
  name: homelab

# === Operator: Single-Node → 1 Replica ===
operator:
  replicas: 1

# === IPAM: muss mit K3s cluster-cidr übereinstimmen ===
ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.42.0.0/16"

# === API Server Verbindung ===
# Ohne kube-proxy kann Cilium den API Server nicht via
# kubernetes.default.svc finden — muss explizit gesetzt werden
k8sServiceHost: "192.168.178.63"
k8sServicePort: 6443

# === kube-proxy Replacement via eBPF ===
kubeProxyReplacement: true
socketLB:
  enabled: true

# === Routing ===
routingMode: tunnel
tunnelProtocol: vxlan

# === Hubble: Network Observability ===
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - icmp
      - http

# === Prometheus-Metriken für Grafana ===
prometheus:
  enabled: true
  serviceMonitor:
    enabled: false  # Auf true setzen wenn Prometheus Operator läuft

# === Security-Features ===
# Network Policies aktiviert (Standard)
# L7 Proxy für HTTP-aware Policies
l7Proxy: true

# BPF Masquerade (performanter als iptables)
bpf:
  masquerade: true

# Eingebaute Gateway-API nutzen
gatewayAPI:
  enabled: true
  hostNetwork:
    enabled: true

envoy:
  securityContext:
    capabilities:
      envoy:
        - NET_ADMIN
        - SYS_ADMIN
        - NET_BIND_SERVICE
      keepCapNetBindService: true
      