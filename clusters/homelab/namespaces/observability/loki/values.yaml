
deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  resources: 
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  persistence:
    size: 10Gi
    storageClass: local-path
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: storage
            operator: In
            values:
            - local-ssd
chunksCache:
  allocatedMemory: 2048 # MB
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  pattern_ingester:
    enabled: true
  ruler:
    enable_api: true
  storage:
    type: filesystem
  ui:
    enabled: true
  storage_config:
    filesystem:
      directory: /tmp/loki/chunks
  limits_config:
    retention_period: 14d
    allow_structured_metadata: true
    volume_enabled: true
  compactor:
    working_directory: /tmp/loki/retention
    compaction_interval: 1h
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem
  schemaConfig:
    configs:
    - from: "2026-05-09"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h
gateway:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus
minio:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
read:
  replicas: 0
distributor:
  replicas: 0
indexGateway:
  replicas: 0
ingester:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
compactor:
  replicas: 0
