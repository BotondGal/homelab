---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability
  annotations:
    tailscale.com/proxy-class: default
spec:
  defaultBackend:
    service:
      name: grafana
      port:
        number: 80
  ingressClassName: tailscale
  tls:
    - hosts:
        - grafana